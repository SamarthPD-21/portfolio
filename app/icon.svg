<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft outer glow/shadow -->
  <rect x="2" y="2" width="96" height="96" rx="28" fill="url(#logo-grad)" filter="url(#drop-shadow)" />
  
  <!-- Glossy glass reflection overlay -->
  <rect x="2" y="2" width="96" height="96" rx="28" fill="url(#glass-overlay)" />
  
  <!-- Glowing Monogram Letters (S and D) -->
  <!-- S (neon blur) -->
  <path d="M54 35 C 54 22, 26 22, 26 35 C 26 48, 54 48, 54 61 C 54 74, 26 74, 26 61" 
        stroke="white" stroke-width="9" stroke-linecap="round" fill="none" filter="url(#glow-filter)" />
  <!-- S (sharp foreground) -->
  <path d="M54 35 C 54 22, 26 22, 26 35 C 26 48, 54 48, 54 61 C 54 74, 26 74, 26 61" 
        stroke="white" stroke-width="9" stroke-linecap="round" fill="none" />
        
  <!-- D (neon blur) -->
  <path d="M46 25 L 63 25 C 81 25, 81 71, 63 71 L 46 71 Z" 
        stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow-filter)" />
  <!-- D (sharp foreground) -->
  <path d="M46 25 L 63 25 C 81 25, 81 71, 63 71 L 46 71 Z" 
        stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <defs>
    <filter id="drop-shadow" x="0" y="0" width="100" height="100" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ff6563" flood-opacity="0.4" />
    </filter>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc80" />
      <stop offset="50%" stop-color="#ff6563" />
      <stop offset="100%" stop-color="#cf3d3c" />
    </linearGradient>
    <linearGradient id="glass-overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35" />
      <stop offset="40%" stop-color="white" stop-opacity="0.1" />
      <stop offset="100%" stop-color="black" stop-opacity="0.15" />
    </linearGradient>
  </defs>
</svg>
